<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포스트 빌더</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:14px;background:#f5f4f0;color:#1e1c18}
#app{display:grid;grid-template-columns:200px 1fr;height:100vh}
#sidebar{background:#eeecea;border-right:1px solid #dddbd5;overflow-y:auto;padding:12px 8px;display:flex;flex-direction:column;gap:5px}
#sidebar h3{font-size:10px;font-weight:500;color:#999;letter-spacing:.07em;margin:4px 2px 2px}
.blk-btn{display:flex;align-items:center;gap:7px;padding:7px 9px;background:#fff;border:1px solid #dddbd5;border-radius:6px;cursor:pointer;font-size:12px;color:#555;width:100%;text-align:left;transition:all .12s}
.blk-btn:hover{background:#f5f4f0;border-color:#bbb;color:#1e1c18}
.bi{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.bi-na{background:#d4f0e0;color:#2a8a5a}.bi-sc{background:#d4e8f8;color:#2268a8}.bi-di{background:#e8d8f8;color:#7040c0}.bi-im{background:#f8ecd0;color:#a06010}.bi-ch{background:#fdd8d8;color:#c03030}.bi-ms{background:#fcd8ec;color:#c03080}.bi-en{background:#e8e8e8;color:#666}
#main{display:flex;flex-direction:column;overflow:hidden;background:#fafaf8}
#tabs{display:flex;border-bottom:1px solid #dddbd5;background:#eeecea;flex-shrink:0}
.tab{padding:10px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:#999;margin-bottom:-1px;transition:color .15s}
.tab.active{color:#1e1c18;border-bottom-color:#c4986a}
.tab:hover{color:#555}
#canvas-wrap{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:#ccc #fafaf8}
.empty-msg{color:#bbb;font-size:13px;text-align:center;margin-top:60px;line-height:2}
.cblk{background:#fff;border:1px solid #dddbd5;border-radius:8px;padding:10px 12px;position:relative;transition:border-color .15s}
.cblk:hover{border-color:#bbb}
.cblk:hover .bacts{opacity:1}
.bacts{position:absolute;top:8px;right:8px;display:flex;gap:3px;opacity:0;transition:opacity .15s}
.bact{width:20px;height:20px;border-radius:3px;border:1px solid #ddd;background:#f5f4f0;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:#999;transition:all .12s}
.bact:hover{background:#fff;color:#333}
.bact.del:hover{color:#e05050;border-color:#e05050}
.btag{font-size:9px;padding:2px 7px;border-radius:100px;font-weight:600;margin-bottom:7px;display:inline-block;letter-spacing:.04em}
.t-na{background:#d4f0e0;color:#2a8a5a}.t-sc{background:#d4e8f8;color:#2268a8}.t-di{background:#e8d8f8;color:#7040c0}.t-im{background:#f8ecd0;color:#a06010}.t-ch{background:#fdd8d8;color:#c03030}.t-ms{background:#fcd8ec;color:#c03080}.t-en{background:#e8e8e8;color:#666}
.flabel{font-size:10px;color:#999;margin-bottom:2px;margin-top:7px}
.flabel:first-of-type{margin-top:0}
.finput{width:100%;background:#fafaf8;border:1px solid #ddd;border-radius:5px;padding:5px 8px;font-size:12px;color:#1e1c18;font-family:inherit;resize:vertical}
.finput:focus{outline:none;border-color:#c4986a}
textarea.finput{min-height:48px}
select.finput{height:30px;resize:none}
.frow{display:flex;gap:7px}
.frow>div{flex:1;min-width:0}
.sub-blk-area{margin-top:8px;border-top:1px dashed #dddbd5;padding-top:8px;display:flex;flex-direction:column;gap:6px}
.sub-blk-label{font-size:10px;color:#aaa;margin-bottom:4px}
.sub-add-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.sub-add-btn{font-size:10px;padding:3px 8px;border:1px solid #ddd;border-radius:5px;background:#f5f4f0;cursor:pointer;color:#888;transition:all .12s}
.sub-add-btn:hover{border-color:#c4986a;color:#c4986a}
.sblk{background:#f5f4f0;border:1px solid #ddd;border-radius:6px;padding:8px 10px;position:relative}
.sblk:hover .sbacts{opacity:1}
.sbacts{position:absolute;top:5px;right:5px;display:flex;gap:2px;opacity:0}
.sbact{width:17px;height:17px;border-radius:2px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:#999}
.sbact.del:hover{color:#e05050}
.sbtag{font-size:9px;padding:1px 5px;border-radius:100px;font-weight:600;margin-bottom:4px;display:inline-block}
.msg-step{background:#f5f4f0;border:1px solid #ddd;border-radius:6px;padding:8px 10px;margin-top:6px}
.msg-step-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.msg-step-label{font-size:10px;font-weight:500;color:#888}
.msg-step-del{font-size:11px;cursor:pointer;color:#bbb;padding:1px 4px;border-radius:3px;transition:color .12s}
.msg-step-del:hover{color:#e05050}
.mode-tabs{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.mode-tab{font-size:10px;padding:3px 8px;border:1px solid #ddd;border-radius:5px;cursor:pointer;color:#888;background:#fff;transition:all .12s}
.mode-tab.active{background:#c4986a;color:#fff;border-color:#c4986a;font-weight:600}
#preview-wrap{flex:1;overflow-y:auto;padding:0}
#preview-inner{padding:20px;max-width:640px;margin:0 auto}
#code-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
#code-out{flex:1;overflow-y:auto;padding:14px;font-family:'Consolas','D2Coding',monospace;font-size:12px;line-height:1.7;color:#555;white-space:pre-wrap;word-break:break-all;background:#f0eeea}
#code-footer{padding:8px 12px;border-top:1px solid #dddbd5;display:flex;gap:7px;align-items:center;flex-shrink:0;background:#eeecea}
.abtn{padding:7px 14px;border:1px solid #ddd;border-radius:6px;background:transparent;cursor:pointer;font-size:12px;color:#555;font-family:inherit;transition:all .15s}
.abtn:hover{background:#f5f4f0;border-color:#bbb}
.abtn.primary{background:#c4986a;color:#fff;border-color:#c4986a;font-weight:600}
.abtn.primary:hover{background:#d4a87a}
.abtn.danger{border-color:#f5cccc;color:#e05050}
.abtn.danger:hover{background:#fdf0f0}
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;z-index:999}
#confirm-box{background:#fff;border:1px solid #dddbd5;border-radius:10px;padding:24px 28px;min-width:240px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.10)}
#confirm-box p{font-size:13px;color:#555;margin-bottom:18px;line-height:1.7}
#confirm-box .cbtn-row{display:flex;gap:8px;justify-content:center}

/* 미리보기 CSS */
#preview-inner .narration{padding:10px 20px;font-size:13px;font-style:italic;color:#5A4A38;text-align:center;border-top:1px dashed rgba(196,152,106,0.35);border-bottom:1px dashed rgba(196,152,106,0.35);margin:8px 0;line-height:1.9}
#preview-inner .scene-title{display:flex;align-items:center;gap:12px;padding:18px 0 14px}
#preview-inner .scene-title::before,#preview-inner .scene-title::after{content:'';flex:1;height:1px}
#preview-inner .scene-title::before{background:linear-gradient(90deg,transparent,rgba(196,152,106,.35))}
#preview-inner .scene-title::after{background:linear-gradient(90deg,rgba(196,152,106,.35),transparent)}
#preview-inner .scene-title-inner{font-size:10px;letter-spacing:4px;color:#C4986A;font-weight:300;white-space:nowrap;flex-shrink:0}
#preview-inner .dialogue{padding:12px 0;border-bottom:1px solid rgba(196,152,106,.18);display:flex;flex-direction:column;gap:4px}
#preview-inner .dialogue-name{font-size:11px;font-weight:600;letter-spacing:1px}
#preview-inner .name-ayn{color:#A21C14}#preview-inner .name-alkaid{color:#307327}#preview-inner .name-rorschach{color:#F4994E}#preview-inner .name-clarence{color:#3C3A71}#preview-inner .name-emrald,#preview-inner .name-emerald{color:#C3B7DD}#preview-inner .name-mc{color:#7A6272}#preview-inner .name-isidore{color:#A86848}#preview-inner .name-npc{color:#5A4A38}
#preview-inner .dialogue-text{font-size:14px;color:#2A2018;line-height:1.9;padding-left:14px;border-left:2px solid rgba(196,152,106,.18)}
#preview-inner .illust-block{margin:16px 0;border:1px solid rgba(196,152,106,.35);background:#F3EBD8;overflow:hidden}
#preview-inner .illust-block img{width:100%;display:block}
#preview-inner .illust-caption{padding:8px 14px;font-size:10px;color:#9A8878;text-align:center;font-style:italic;border-top:1px solid rgba(196,152,106,.18);background:#FBF6EE}
#preview-inner .choice-block{margin:16px 0;border:1px solid rgba(196,152,106,.35);background:#F3EBD8;overflow:hidden}
#preview-inner .choice-label{padding:10px 16px;background:linear-gradient(90deg,transparent,rgba(196,152,106,.15),transparent);border-bottom:1px solid rgba(196,152,106,.35);font-size:9px;letter-spacing:4px;color:#C4986A;text-align:center;font-weight:300}
#preview-inner .choice-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 20px;background:#FBF6EE;border:none;border-bottom:1px solid rgba(196,152,106,.18);cursor:pointer;text-align:left;font-size:13px;color:#2A2018;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif}
#preview-inner .choice-btn::before{content:'';flex-shrink:0;width:6px;height:6px;border:1px solid #C4986A;border-radius:50%}
#preview-inner .choice-btn:hover{background:#F3EBD8;color:#A86848}
#preview-inner .choice-btn.selected{background:rgba(196,152,106,.12);color:#A86848}
#preview-inner .choice-btn.selected::before{background:#A86848;border-color:#A86848}
#preview-inner .choice-result{display:none;border-top:1px solid rgba(196,152,106,.18);padding:16px 20px;background:rgba(196,152,106,.06)}
#preview-inner .choice-result.show{display:block}
#preview-inner .choice-result-label{font-size:8px;letter-spacing:3px;color:#C4986A;margin-bottom:10px;font-weight:300}
#preview-inner .dagse-wrap{width:100%;display:flex;justify-content:center;margin:20px 0}
#preview-inner .dagse-screen{width:320px;height:520px;background:#FAF6EE;border:1px solid rgba(196,152,106,.35);border-radius:4px;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(168,104,72,.12)}
#preview-inner .dagse-head{background:linear-gradient(135deg,#A86848,#C49068);color:#FBF6EE;padding:12px 16px;text-align:center;font-size:12px;letter-spacing:4px;flex-shrink:0;border-bottom:1px solid rgba(196,152,106,.4)}
#preview-inner .mh-ayn{background:linear-gradient(90deg,#A21C14,#d1433c)}#preview-inner .mh-alkaid{background:linear-gradient(90deg,#307327,#59a94e)}#preview-inner .mh-rorschach{background:linear-gradient(90deg,#F4994E,#febe89)}#preview-inner .mh-clarence{background:linear-gradient(90deg,#3C3A71,#706daf)}#preview-inner .mh-emerald{background:linear-gradient(90deg,#C3B7DD,#9986c2)}#preview-inner .mh-isidore{background:linear-gradient(90deg,#A86848,#cc967b)}#preview-inner .mh-default{background:linear-gradient(90deg,#8A7A68,#AAA090)}
#preview-inner .dagse-box{flex:1;overflow-y:auto;padding:16px 12px 110px;display:flex;flex-direction:column;gap:8px;background:#FAF6EE}
#preview-inner .d-msg{max-width:72%;padding:9px 12px;font-size:12px;line-height:1.7;word-break:keep-all;opacity:0;animation:msgFade .4s forwards}
#preview-inner .d-l{align-self:flex-start;background:#fff;border:1px solid rgba(196,152,106,.22);color:#2A2018;border-radius:0 12px 12px 12px}
#preview-inner .d-r{align-self:flex-end;background:#A86848;color:#fff;border-radius:12px 0 12px 12px}
#preview-inner .d-end-msg{text-align:center;font-size:9px;letter-spacing:3px;color:rgba(196,152,106,.6);margin-top:12px;opacity:0;animation:msgFade 1s forwards;width:100%;align-self:center}
#preview-inner .dagse-btns{position:absolute;bottom:0;left:0;width:100%;padding:10px 12px;background:rgba(250,246,238,.97);border-top:1px solid rgba(196,152,106,.25);display:flex;flex-direction:column;gap:6px;z-index:20}
#preview-inner .dagse-btns::before{content:'◆ 답장 선택 ◆';font-size:8px;letter-spacing:3px;color:rgba(196,152,106,.6);text-align:center;display:block;margin-bottom:2px}
#preview-inner .d-btn{background:#F3EBD8;border:1px solid rgba(196,152,106,.35);border-radius:12px 2px 12px 12px;padding:8px 12px;color:#5A4A38;font-size:11px;cursor:pointer;text-align:right;font-family:inherit}
#preview-inner .d-btn:hover{background:#A86848;color:#fff;border-color:#A86848}
#preview-inner .chapter-nav{display:flex;justify-content:space-between;gap:12px;margin-top:32px;padding-top:16px;border-top:1px solid rgba(196,152,106,.18)}
#preview-inner .chapter-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;background:#F3EBD8;border:1px solid rgba(196,152,106,.35);font-size:11px;letter-spacing:1px;color:#5A4A38;text-decoration:none}
#preview-inner .end-line{text-align:center;padding:24px 0 6px;font-size:10px;letter-spacing:3px;color:#9A8878}
@keyframes msgFade{to{opacity:1}}
</style>
</head>
<body>

<div id="confirm-overlay">
  <div id="confirm-box">
    <p>모든 블록을 초기화할까요?</p>
    <div class="cbtn-row">
      <button class="abtn danger" id="confirm-yes">초기화</button>
      <button class="abtn" id="confirm-no">취소</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <h3>블록 추가</h3>
    <button class="blk-btn" data-type="narration"><span class="bi bi-na">나</span>나레이션</button>
    <button class="blk-btn" data-type="scene"><span class="bi bi-sc">장</span>장면 제목</button>
    <button class="blk-btn" data-type="dialogue"><span class="bi bi-di">대</span>대사</button>
    <button class="blk-btn" data-type="image"><span class="bi bi-im">이</span>이미지/일러</button>
    <button class="blk-btn" data-type="choice"><span class="bi bi-ch">선</span>선택지 분기</button>
    <button class="blk-btn" data-type="messenger"><span class="bi bi-ms">메</span>메신저 창</button>
    <button class="blk-btn" data-type="end"><span class="bi bi-en">끝</span>종료/챕터</button>
  </div>
  <div id="main">
    <div id="tabs">
      <div class="tab active" data-tab="editor">에디터</div>
      <div class="tab" data-tab="preview">미리보기</div>
      <div class="tab" data-tab="code">HTML 코드</div>
    </div>
    <div id="canvas-wrap">
      <div class="empty-msg" id="empty">← 왼쪽 버튼을 클릭하면 블록이 추가돼요</div>
    </div>
    <div id="preview-wrap" style="display:none"><div id="preview-inner"></div></div>
    <div id="code-wrap" style="display:none">
      <div id="code-out"></div>
      <div id="code-footer">
        <button class="abtn primary" id="copy-btn">코드 복사</button>
        <button class="abtn danger" id="clear-btn">전체 초기화</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
var blocks=[],cnt={choice:0,msg:0};
var canvasWrap=document.getElementById('canvas-wrap'),previewInner=document.getElementById('preview-inner'),codeOut=document.getElementById('code-out'),empty=document.getElementById('empty'),overlay=document.getElementById('confirm-overlay');
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now()+Math.floor(Math.random()*9999);}
var nameOpts=[{v:'name-ayn',l:'Ayn'},{v:'name-alkaid',l:'Alkaid'},{v:'name-rorschach',l:'Rorschach'},{v:'name-clarence',l:'Clarence'},{v:'name-emrald',l:'Emrald'},{v:'name-isidore',l:'Isidore'},{v:'name-mc',l:'MC'},{v:'name-npc',l:'NPC'}];
var hdrOpts=[{v:'mh-rorschach',l:'Rorschach'},{v:'mh-ayn',l:'Ayn'},{v:'mh-alkaid',l:'Alkaid'},{v:'mh-clarence',l:'Clarence'},{v:'mh-emerald',l:'Emerald'},{v:'mh-isidore',l:'Isidore'},{v:'mh-default',l:'Default'}];
function newMsgStep(idx){return {id:uid(),stepNum:idx,initMsgs:['메시지'],mode:'choice-end',optA:'답장 A',optB:'답장 B',resA:'A 답장',resB:'B 답장',afterMsg:'마지막으로 받는 메시지'};}
function newSubBlk(type){var b={id:uid(),type:type};if(type==='narration')b.text='나레이션 내용';if(type==='dialogue'){b.charName='캐릭터';b.nameClass='name-rorschach';b.text='대사 내용';}if(type==='image'){b.url='';b.alt='';b.caption='';}return b;}
document.querySelectorAll('.blk-btn').forEach(function(btn){btn.addEventListener('click',function(){addBlock(btn.dataset.type);});});
function addBlock(type){
  var b={type:type,id:uid()};
  if(type==='narration')b.text='나레이션 내용을 입력하세요.';
  if(type==='scene')b.name='장면 이름';
  if(type==='dialogue'){b.charName='캐릭터 이름';b.nameClass='name-rorschach';b.text='대사 내용';}
  if(type==='image'){b.url='';b.alt='';b.caption='';}
  if(type==='choice'){cnt.choice++;b.cid='choice'+cnt.choice;b.optA='선택지 A';b.optB='선택지 B';b.subA=[];b.subB=[];}
  if(type==='messenger'){cnt.msg++;b.mid=cnt.msg;b.headerClass='mh-rorschach';b.headerName='상대방 이름';b.steps=[newMsgStep(1)];}
  if(type==='end'){b.prevUrl='#';b.prevTitle='이전 화';b.nextUrl='#';b.nextTitle='다음 화';}
  blocks.push(b);renderCanvas();
}
function removeBlock(id){blocks=blocks.filter(function(b){return b.id!==id;});renderCanvas();}
function moveBlock(id,dir){var i=blocks.findIndex(function(b){return b.id===id;});if(i<0)return;if(dir==='up'&&i>0){var t=blocks[i];blocks[i]=blocks[i-1];blocks[i-1]=t;}if(dir==='dn'&&i<blocks.length-1){var t=blocks[i];blocks[i]=blocks[i+1];blocks[i+1]=t;}renderCanvas();}
function mkInput(label,field,val){return '<div class="flabel">'+label+'</div><input class="finput" data-f="'+field+'" value="'+esc(val)+'" type="text">';}
function mkTA(label,field,val){return '<div class="flabel">'+label+'</div><textarea class="finput" data-f="'+field+'" rows="2">'+esc(val)+'</textarea>';}
function mkSel(label,field,val,opts){var s='<div class="flabel">'+label+'</div><select class="finput" data-f="'+field+'">';opts.forEach(function(o){s+='<option value="'+o.v+'"'+(val===o.v?' selected':'')+'>'+o.l+'</option>';});return s+'</select>';}
var tagMap={narration:['나레이션','t-na'],scene:['장면','t-sc'],dialogue:['대사','t-di'],image:['이미지','t-im'],choice:['선택지','t-ch'],messenger:['메신저','t-ms'],end:['종료','t-en']};
function renderSubBlkEditor(sb,parentBlk,arrKey){
  var div=document.createElement('div');div.className='sblk';
  var tmap={narration:['나레이션','t-na'],dialogue:['대사','t-di'],image:['이미지','t-im']};var ti=tmap[sb.type];
  var inner='<div class="sbacts"><div class="sbact del">×</div></div><span class="sbtag '+ti[1]+'">'+ti[0]+'</span><br>';
  if(sb.type==='narration')inner+=mkTA('내용','text',sb.text);
  else if(sb.type==='dialogue')inner+='<div class="frow"><div>'+mkSel('클래스','nameClass',sb.nameClass,nameOpts)+'</div><div>'+mkInput('이름','charName',sb.charName)+'</div></div>'+mkTA('대사','text',sb.text);
  else if(sb.type==='image')inner+=mkInput('URL','url',sb.url)+'<div class="frow"><div>'+mkInput('alt','alt',sb.alt)+'</div><div>'+mkInput('캡션','caption',sb.caption)+'</div></div>';
  div.innerHTML=inner;
  div.querySelectorAll('[data-f]').forEach(function(inp){inp.addEventListener('input',function(){sb[inp.dataset.f]=inp.value;});});
  div.querySelector('.sbact.del').addEventListener('click',function(){var arr=parentBlk[arrKey];var idx=arr.findIndex(function(x){return x.id===sb.id;});if(idx>-1){arr.splice(idx,1);renderCanvas();}});
  return div;
}
function renderChoiceSubArea(blk,arrKey,label){
  var wrap=document.createElement('div');wrap.className='sub-blk-area';
  wrap.innerHTML='<div class="sub-blk-label">'+label+' 결과 블록</div><div class="sub-add-row"><button class="sub-add-btn" data-sub="narration">+ 나레이션</button><button class="sub-add-btn" data-sub="dialogue">+ 대사</button><button class="sub-add-btn" data-sub="image">+ 이미지</button></div>';
  var subList=document.createElement('div');subList.style.cssText='display:flex;flex-direction:column;gap:5px';
  blk[arrKey].forEach(function(sb){subList.appendChild(renderSubBlkEditor(sb,blk,arrKey));});
  wrap.appendChild(subList);
  wrap.querySelectorAll('.sub-add-btn').forEach(function(btn){btn.addEventListener('click',function(){blk[arrKey].push(newSubBlk(btn.dataset.sub));renderCanvas();});});
  return wrap;
}
function renderMsgStepEditor(step,blk,stepIdx,isLast){
  var div=document.createElement('div');div.className='msg-step';
  var modeLabels={'choice-end':'선택지 → 종료','choice-recv-end':'선택지 → 상대메시지 → 종료','recv-end':'상대메시지만 → 종료'};
  var hdr='<div class="msg-step-header"><span class="msg-step-label">'+stepIdx+'단계'+(isLast?' (마지막)':'')+'</span>'+(blk.steps.length>1?'<span class="msg-step-del" data-sdel="'+step.id+'">× 삭제</span>':'')+'</div>';
  var modeHtml='';
  if(isLast){modeHtml='<div class="flabel">마무리 방식</div><div class="mode-tabs">';['choice-end','choice-recv-end','recv-end'].forEach(function(m){modeHtml+='<div class="mode-tab'+(step.mode===m?' active':'')+'" data-mode="'+m+'">'+modeLabels[m]+'</div>';});modeHtml+='</div>';}
  var initHtml='<div class="flabel">초기 메시지</div>';
  step.initMsgs.forEach(function(m,mi){initHtml+='<div style="display:flex;gap:4px;margin-bottom:4px"><input class="finput" style="flex:1" data-smsg="'+mi+'" value="'+esc(m)+'" type="text">'+(step.initMsgs.length>1?'<button style="font-size:10px;padding:0 6px;border:1px solid #333;border-radius:4px;background:#1e1e1e;cursor:pointer;color:#666" data-delmsg="'+mi+'">×</button>':'')+'</div>';});
  initHtml+='<button class="sub-add-btn" data-addmsg="1" style="margin-bottom:4px">+ 메시지 추가</button>';
  var mode=isLast?step.mode:'choice-end';
  var choiceHtml='';
  if(mode!=='recv-end'){choiceHtml='<div class="frow" style="margin-top:4px"><div>'+mkInput('선택지 A','optA',step.optA)+'</div><div>'+mkInput('선택지 B','optB',step.optB)+'</div></div><div class="frow"><div>'+mkTA('A 답장','resA',step.resA)+'</div><div>'+mkTA('B 답장','resB',step.resB)+'</div></div>';}
  var afterHtml='';
  if(isLast&&(step.mode==='choice-recv-end'||step.mode==='recv-end')){afterHtml=mkInput('상대방 마지막 메시지','afterMsg',step.afterMsg);}
  div.innerHTML=hdr+modeHtml+initHtml+choiceHtml+afterHtml;
  div.querySelectorAll('.mode-tab').forEach(function(mt){mt.addEventListener('click',function(){step.mode=mt.dataset.mode;renderCanvas();});});
  div.querySelectorAll('[data-smsg]').forEach(function(inp){inp.addEventListener('input',function(){step.initMsgs[parseInt(inp.dataset.smsg)]=inp.value;});});
  div.querySelectorAll('[data-delmsg]').forEach(function(btn){btn.addEventListener('click',function(){step.initMsgs.splice(parseInt(btn.dataset.delmsg),1);renderCanvas();});});
  var am=div.querySelector('[data-addmsg]');if(am)am.addEventListener('click',function(){step.initMsgs.push('메시지');renderCanvas();});
  var sd=div.querySelector('[data-sdel]');if(sd)sd.addEventListener('click',function(){blk.steps=blk.steps.filter(function(s){return s.id!==step.id;});renderCanvas();});
  div.querySelectorAll('[data-f]').forEach(function(inp){inp.addEventListener('input',function(){step[inp.dataset.f]=inp.value;});});
  return div;
}
function buildBlockEl(b,i){
  var el=document.createElement('div');el.className='cblk';el.dataset.id=b.id;

  var acts='<div class="bacts">'+(i>0?'<div class="bact" data-a="up">↑</div>':'')+(i<blocks.length-1?'<div class="bact" data-a="dn">↓</div>':'')+'<div class="bact del" data-a="del">×</div></div>';
  el.innerHTML=acts+'<span class="btag '+t[1]+'">'+t[0]+'</span>';
  var body=document.createElement('div');body.style.marginTop='6px';
  if(b.type==='narration')body.innerHTML=mkTA('내용','text',b.text);
  else if(b.type==='scene')body.innerHTML=mkInput('장면 이름','name',b.name);
  else if(b.type==='dialogue')body.innerHTML='<div class="frow"><div>'+mkSel('이름 클래스','nameClass',b.nameClass,nameOpts)+'</div><div>'+mkInput('캐릭터 이름','charName',b.charName)+'</div></div>'+mkTA('대사 내용','text',b.text);
  else if(b.type==='image')body.innerHTML=mkInput('이미지 URL','url',b.url)+'<div class="frow"><div>'+mkInput('alt','alt',b.alt)+'</div><div>'+mkInput('캡션','caption',b.caption)+'</div></div>';
  else if(b.type==='choice'){body.innerHTML='<div class="frow"><div>'+mkInput('선택지 A','optA',b.optA)+'</div><div>'+mkInput('선택지 B','optB',b.optB)+'</div></div>';body.appendChild(renderChoiceSubArea(b,'subA','A'));body.appendChild(renderChoiceSubArea(b,'subB','B'));}
  else if(b.type==='messenger'){body.innerHTML='<div class="frow"><div>'+mkSel('헤더 색상','headerClass',b.headerClass,hdrOpts)+'</div><div>'+mkInput('상대방 이름','headerName',b.headerName)+'</div></div>';b.steps.forEach(function(step,si){body.appendChild(renderMsgStepEditor(step,b,si+1,si===b.steps.length-1));});var ab=document.createElement('button');ab.className='sub-add-btn';ab.style.marginTop='6px';ab.textContent='+ 단계 추가';ab.addEventListener('click',function(){b.steps.push(newMsgStep(b.steps.length+1));renderCanvas();});body.appendChild(ab);}
  else if(b.type==='end')body.innerHTML='<div class="frow"><div>'+mkInput('이전화 URL','prevUrl',b.prevUrl)+'</div><div>'+mkInput('이전화 제목','prevTitle',b.prevTitle)+'</div></div><div class="frow"><div>'+mkInput('다음화 URL','nextUrl',b.nextUrl)+'</div><div>'+mkInput('다음화 제목','nextTitle',b.nextTitle)+'</div></div>';
  body.querySelectorAll('[data-f]').forEach(function(inp){inp.addEventListener('input',function(){b[inp.dataset.f]=inp.value;});});
  el.appendChild(body);
  el.querySelectorAll('.bact').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var a=btn.dataset.a;if(a==='del')removeBlock(b.id);else moveBlock(b.id,a);});});
  return el;
}
function renderCanvas(){canvasWrap.querySelectorAll('.cblk').forEach(function(e){e.remove();});empty.style.display=blocks.length===0?'block':'none';blocks.forEach(function(b,i){canvasWrap.appendChild(buildBlockEl(b,i));});}

function generateHtml(){
  var parts=[];
  blocks.forEach(function(b){
    if(b.type==='narration')parts.push('<div class="narration">\n  '+esc(b.text)+'\n</div>');
    else if(b.type==='scene')parts.push('<div class="scene-title">\n  <div class="scene-title-inner">'+esc(b.name)+'</div>\n</div>');

    else if(b.type==='choice'){var rA=b.subA.map(subBlkHtml).join('\n');var rB=b.subB.map(subBlkHtml).join('\n');parts.push('<div class="choice-block" id="'+b.cid+'">\n  <div class="choice-label">◆ &nbsp; 선 택 &nbsp; ◆</div>\n  <button class="choice-btn" onclick="selectChoice(\''+b.cid+'\', 0)">'+esc(b.optA)+'</button>\n  <button class="choice-btn" onclick="selectChoice(\''+b.cid+'\', 1)">'+esc(b.optB)+'</button>\n\n  <div class="choice-result" id="'+b.cid+'-result-0">\n    <div class="choice-result-label">▷ 선택 결과</div>\n    '+rA+'\n  </div>\n\n  <div class="choice-result" id="'+b.cid+'-result-1">\n    <div class="choice-result-label">▷ 선택 결과</div>\n    '+rB+'\n  </div>\n</div>');}
    else if(b.type==='messenger'){
      var m=b.mid;
      var btnsHtml='';
      b.steps.forEach(function(step,si){var isLast=si===b.steps.length-1;var mode=isLast?step.mode:'choice-end';if(mode!=='recv-end'){var disp=si===0?'':'display:none;';btnsHtml+='    <div class="dagse-btns" id="btns-'+m+'-'+(si+1)+'" style="'+disp+'">\n      <div class="d-btn" id="btn-'+m+'-'+(si+1)+'-A">'+esc(step.optA)+'</div>\n      <div class="d-btn" id="btn-'+m+'-'+(si+1)+'-B">'+esc(step.optB)+'</div>\n    </div>\n';}});
      var varDecls='';b.steps.forEach(function(step,si){var isLast=si===b.steps.length-1;var mode=isLast?step.mode:'choice-end';if(mode!=='recv-end')varDecls+='    var s'+(si+1)+'=document.getElementById(\'btns-'+m+'-'+(si+1)+'\');\n';});
      var jsLines='';var delay=200;b.steps[0].initMsgs.forEach(function(m2){jsLines+='    setTimeout(function(){msg(\'left\',\''+esc(m2)+'\');},'+delay+');\n';delay+=800;});
      var firstMode=b.steps.length===1?b.steps[0].mode:'choice-end';
      if(b.steps.length===1&&firstMode==='recv-end'){if(b.steps[0].afterMsg)jsLines+='    setTimeout(function(){msg(\'left\',\''+esc(b.steps[0].afterMsg)+'\');},'+delay+');\n',delay+=800;jsLines+='    setTimeout(end,'+delay+');\n';}
      else{
        b.steps.forEach(function(step,si){var sn=si+1;var isLast=si===b.steps.length-1;var mode=isLast?step.mode:'choice-end';if(mode==='recv-end')return;jsLines+='    function step'+sn+'(opt){\n      s'+sn+'.style.display=\'none\';\n      if(opt===\'A\'){setTimeout(function(){msg(\'right\',\''+esc(step.resA)+'\');},200);}else{setTimeout(function(){msg(\'right\',\''+esc(step.resB)+'\');},200);}\n';if(!isLast){var nd=1200;b.steps[si+1].initMsgs.forEach(function(nm){jsLines+='      setTimeout(function(){msg(\'left\',\''+esc(nm)+'\');},'+nd+');\n';nd+=800;});var nextMode=si+1===b.steps.length-1?b.steps[si+1].mode:'choice-end';if(nextMode!=='recv-end')jsLines+='      setTimeout(function(){s'+(sn+1)+'.style.display=\'flex\';},'+nd+');\n';else{if(b.steps[si+1].afterMsg)jsLines+='      setTimeout(function(){msg(\'left\',\''+esc(b.steps[si+1].afterMsg)+'\');},'+nd+');\n',nd+=800;jsLines+='      setTimeout(end,'+nd+');\n';}}else{if(mode==='choice-recv-end'&&step.afterMsg){jsLines+='      setTimeout(function(){msg(\'left\',\''+esc(step.afterMsg)+'\');},1200);\n      setTimeout(end,2200);\n';}else jsLines+='      setTimeout(end,1200);\n';}jsLines+='    }\n';});
      }
      var evts='';b.steps.forEach(function(step,si){var isLast=si===b.steps.length-1;var mode=isLast?step.mode:'choice-end';if(mode==='recv-end')return;var sn=si+1;evts+='    document.getElementById(\'btn-'+m+'-'+sn+'-A\').addEventListener(\'click\',function(){step'+sn+'(\'A\');});\n    document.getElementById(\'btn-'+m+'-'+sn+'-B\').addEventListener(\'click\',function(){step'+sn+'(\'B\');});\n';});
      parts.push('<div class="dagse-wrap">\n  <div class="dagse-screen">\n    <div class="dagse-head '+b.headerClass+'">'+esc(b.headerName)+'</div>\n    <div class="dagse-box" id="chat-'+m+'"></div>\n'+btnsHtml+'  </div>\n</div>\n\n<script>\n(function(){\n  window.addEventListener(\'load\',function(){\n    var box=document.getElementById(\'chat-'+m+'\');\n'+varDecls+'    if(!box)return;\n    function msg(side,txt){var d=document.createElement(\'div\');d.className=side===\'left\'?\'d-msg d-l\':\'d-msg d-r\';d.innerText=txt;box.appendChild(d);box.scrollTo({top:box.scrollHeight,behavior:\'smooth\'});}\n    function end(){var d=document.createElement(\'div\');d.className=\'d-end-msg\';d.innerText=\'— 메시지 종료 —\';box.appendChild(d);}\n'+jsLines+evts+'  });\n})();\n<\/script>');
    }
    else if(b.type==='end')parts.push('<div class="end-line">— END —</div>\n\n<div class="chapter-nav">\n  <a href="'+esc(b.prevUrl)+'" class="chapter-btn">← '+esc(b.prevTitle)+'</a>\n  <a href="'+esc(b.nextUrl)+'" class="chapter-btn">'+esc(b.nextTitle)+' →</a>\n</div>');
  });
  if(blocks.some(function(b){return b.type==='choice';}))parts.push('<script>\nfunction selectChoice(blockId,idx){\n  var block=document.getElementById(blockId);\n  var btns=block.querySelectorAll(\'.choice-btn\');\n  var results=block.querySelectorAll(\'.choice-result\');\n  btns.forEach(function(b,i){b.classList.toggle(\'selected\',i===idx);});\n  results.forEach(function(r){r.classList.remove(\'show\');});\n  var target=document.getElementById(blockId+\'-result-\'+idx);\n  if(target)target.classList.add(\'show\');\n}\n<\/script>');
  return parts.join('\n\n');

  if(sb.type==='image'){var cap=sb.caption?'<div class="illust-caption">'+esc(sb.caption)+'</div>':'';return '<div class="illust-block">'+(sb.url?'<img src="'+esc(sb.url)+'" alt="'+esc(sb.alt)+'">':'<div style="height:60px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#9A8878">[이미지]</div>')+cap+'</div>';}

function buildPreviewHtml(){
  var parts=[];
  blocks.forEach(function(b){
    if(b.type==='narration')parts.push('<div class="narration">'+esc(b.text)+'</div>');
    else if(b.type==='scene')parts.push('<div class="scene-title"><div class="scene-title-inner">'+esc(b.name)+'</div></div>');
    else if(b.type==='dialogue')parts.push('<div class="dialogue"><div class="dialogue-name '+b.nameClass+'">'+esc(b.charName)+'</div><div class="dialogue-text">'+esc(b.text)+'</div></div>');
    else if(b.type==='image'){var cap=b.caption?'<div class="illust-caption">'+esc(b.caption)+'</div>':'';parts.push('<div class="illust-block">'+(b.url?'<img src="'+esc(b.url)+'" alt="'+esc(b.alt)+'">':'<div style="height:80px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#9A8878">[이미지: '+esc(b.alt||'미설정')+']</div>')+cap+'</div>');}
    else if(b.type==='choice'){var cid=b.cid;var rA='<div class="choice-result" id="pv-'+cid+'-result-0"><div class="choice-result-label">▷ 선택 결과</div>'+b.subA.map(subBlkPreviewHtml).join('')+'</div>';var rB='<div class="choice-result" id="pv-'+cid+'-result-1"><div class="choice-result-label">▷ 선택 결과</div>'+b.subB.map(subBlkPreviewHtml).join('')+'</div>';parts.push('<div class="choice-block" id="pv-'+cid+'"><div class="choice-label">◆ &nbsp; 선 택 &nbsp; ◆</div><button class="choice-btn" onclick="pvChoice(\'pv-'+cid+'\',0)">'+esc(b.optA)+'</button><button class="choice-btn" onclick="pvChoice(\'pv-'+cid+'\',1)">'+esc(b.optB)+'</button>'+rA+rB+'</div>');}
    else if(b.type==='messenger'){
      var m='pv'+b.mid+'x'+uid();
      var btnsHtml2='';b.steps.forEach(function(step,si){var isLast=si===b.steps.length-1;var mode=isLast?step.mode:'choice-end';if(mode!=='recv-end'){var disp=si===0?'':'display:none;';btnsHtml2+='<div class="dagse-btns" id="'+m+'-btns-'+(si+1)+'" style="'+disp+'"><div class="d-btn" id="'+m+'-btn-'+(si+1)+'-A">'+esc(step.optA)+'</div><div class="d-btn" id="'+m+'-btn-'+(si+1)+'-B">'+esc(step.optB)+'</div></div>';}});
      parts.push('<div class="dagse-wrap"><div class="dagse-screen"><div class="dagse-head '+b.headerClass+'">'+esc(b.headerName)+'</div><div class="dagse-box" id="'+m+'-box"></div>'+btnsHtml2+'</div></div>');
      parts.push('<script data-pvmsg="'+m+'">'+JSON.stringify({mid:m,steps:b.steps.map(function(s,si){var isLast=si===b.steps.length-1;return {initMsgs:s.initMsgs,mode:isLast?s.mode:'choice-end',optA:s.optA,optB:s.optB,resA:s.resA,resB:s.resB,afterMsg:s.afterMsg};})})+' <\/script>');
    }
    else if(b.type==='end')parts.push('<div class="end-line">— END —</div><div class="chapter-nav"><a class="chapter-btn" href="'+esc(b.prevUrl)+'">← '+esc(b.prevTitle)+'</a><a class="chapter-btn" href="'+esc(b.nextUrl)+'">'+esc(b.nextTitle)+' →</a></div>');

window.pvChoice=function(cid,idx){var block=document.getElementById(cid);if(!block)return;block.querySelectorAll('.choice-btn').forEach(function(b,i){b.classList.toggle('selected',i===idx);});block.querySelectorAll('.choice-result').forEach(function(r){r.classList.remove('show');});var t=document.getElementById(cid+'-result-'+idx);if(t)t.classList.add('show');};
function initPvMessengers(){
  previewInner.querySelectorAll('[data-pvmsg]').forEach(function(script){
    var m=script.getAttribute('data-pvmsg');var data;try{data=JSON.parse(script.textContent);}catch(e){return;}
    var box=document.getElementById(m+'-box');if(!box)return;
    function msg(side,txt){var d=document.createElement('div');d.className=side==='left'?'d-msg d-l':'d-msg d-r';d.innerText=txt;box.appendChild(d);box.scrollTo({top:box.scrollHeight,behavior:'smooth'});}
    function endMsg(){var d=document.createElement('div');d.className='d-end-msg';d.innerText='— 메시지 종료 —';box.appendChild(d);}
    var delay=200;data.steps[0].initMsgs.forEach(function(txt){setTimeout(function(){msg('left',txt);},delay);delay+=800;});
    if(data.steps.length===1&&data.steps[0].mode==='recv-end'){if(data.steps[0].afterMsg){setTimeout(function(){msg('left',data.steps[0].afterMsg);},delay);delay+=800;}setTimeout(endMsg,delay);return;}
    function makeStep(si){
      var step=data.steps[si];var sn=si+1;var mode=step.mode;
      if(mode==='recv-end'){if(step.afterMsg)setTimeout(function(){msg('left',step.afterMsg);},200);setTimeout(endMsg,step.afterMsg?1200:200);return;}
      var btnA=document.getElementById(m+'-btn-'+sn+'-A');var btnB=document.getElementById(m+'-btn-'+sn+'-B');var btns=document.getElementById(m+'-btns-'+sn);if(!btnA||!btnB)return;
      function handleStep(opt){btns.style.display='none';setTimeout(function(){msg('right',opt==='A'?step.resA:step.resB);},200);var nd=1200;if(si<data.steps.length-1){var nstep=data.steps[si+1];nstep.initMsgs.forEach(function(txt){setTimeout(function(){msg('left',txt);},nd);nd+=800;});var nextMode=nstep.mode;if(nextMode==='recv-end'){if(nstep.afterMsg){setTimeout(function(){msg('left',nstep.afterMsg);},nd);nd+=800;}setTimeout(endMsg,nd);}else{setTimeout(function(){var nb=document.getElementById(m+'-btns-'+(sn+1));if(nb)nb.style.display='flex';makeStep(si+1);},nd);}}else{if(mode==='choice-recv-end'&&step.afterMsg){setTimeout(function(){msg('left',step.afterMsg);},nd);setTimeout(endMsg,nd+1000);}else setTimeout(endMsg,nd);}}
      btnA.addEventListener('click',function(){handleStep('A');});btnB.addEventListener('click',function(){handleStep('B');});
    }
    makeStep(0);script.remove();
  });
}
document.querySelectorAll('.tab').forEach(function(tab){tab.addEventListener('click',function(){var t=tab.dataset.tab;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});tab.classList.add('active');canvasWrap.style.display=t==='editor'?'flex':'none';document.getElementById('preview-wrap').style.display=t==='preview'?'block':'none';document.getElementById('code-wrap').style.display=t==='code'?'flex':'none';if(t==='preview'){previewInner.innerHTML=buildPreviewHtml();initPvMessengers();}if(t==='code')codeOut.textContent=generateHtml()||'(블록을 추가하세요)';});});
document.getElementById('copy-btn').addEventListener('click',function(){var code=generateHtml();if(!code)return;navigator.clipboard.writeText(code).then(function(){var btn=document.getElementById('copy-btn');btn.textContent='복사됨!';setTimeout(function(){btn.textContent='코드 복사';},1500);});});
document.getElementById('clear-btn').addEventListener('click',function(){overlay.style.display='flex';});
document.getElementById('confirm-yes').addEventListener('click',function(){blocks=[];cnt={choice:0,msg:0};renderCanvas();overlay.style.display='none';document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});document.querySelector('.tab[data-tab="editor"]').classList.add('active');canvasWrap.style.display='flex';document.getElementById('preview-wrap').style.display='none';document.getElementById('code-wrap').style.display='none';});
document.getElementById('confirm-no').addEventListener('click',function(){overlay.style.display='none';});
})();
